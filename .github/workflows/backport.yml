name: "Backport to Stable"
on:
  schedule:
    - cron: "0 0 * * 6" # Saturday 12 am UTC
  workflow_dispatch:
jobs:
  backport:
    name: Backport
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/create-github-app-token@v2
      id: generate-token
      with:
        app-id: ${{ secrets.HEADPATS }}
        private-key: ${{ secrets.LAP_PILLOW }}

    - uses: actions/checkout@v6
      with:
        token: ${{ steps.app-token.outputs.token }}
        ref: stable

    - name: Reset stable branch
      run: |
        git fetch origin master:master
        git reset --hard master

    - name: Create Pull Request
      id: pr
      uses: peter-evans/create-pull-request@v8
      with:
        sign-commits: true
        token: ${{ steps.generate-token.outputs.token }}
        branch: master-to-stable
        title: "[Backport] Merge master to stable"
        body: "This Pull Request is automatically generated and merges changes from master to stable"
        labels: |
          automated pr
        draft: false

    - name: Automerge
      if: steps.pr.outputs.pull-request-operation == 'created'
      run: |
          gh pr review --approve "${{ steps.pr.outputs.pull-request-number }}"
          gh pr merge --merge --auto "${{ steps.pr.outputs.pull-request-number }}"
