name: "Backport to Stable"
on:
  schedule:
    - cron: "30 2 */14 * *" # Run on 14th & 28th of every month at 02:30
  workflow_dispatch:
jobs:
  backport:
    name: Backport
    runs-on: ubuntu-slim
    steps:
    - uses: actions/create-github-app-token@v3
      id: generate-token
      with:
        app-id: ${{ secrets.HEADPATS }}
        private-key: ${{ secrets.LAP_PILLOW }}

    - uses: actions/checkout@v6
      with:
        ref: stable

    - name: Reset stable branch
      run: |
        git fetch origin master:master
        git reset --hard master

    - name: Create Pull Request
      id: pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.generate-token.outputs.token }}
        branch: master-to-stable
        title: "[Backport] Merge master to stable"
        body: "This Pull Request is automatically generated and merges changes from master to stable"
        labels: |
          automated pr
        draft: false
