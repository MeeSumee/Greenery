name: "Evaluate"
on:
  workflow_dispatch:
  push:
    branches:
    - master
    paths:
    - '**.nix'
jobs:
  evaluation:
    name: NixOS Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
    strategy:
      matrix:
        hosts: [beryl, greenery, kaolin, quartz, verdure] 
    steps:
    - uses: actions/checkout@v6

    # Ensure evaluate.yml don't run when lockfile also changes as cache.yml triggers eval anyway
    - name: Filter
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          lockfile:
            - 'flake.lock'

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      if: steps.filter.outputs.lockfile == 'false'
      with:
        nix_version: 2.31.2
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true

    - name: Restore & Save Nix Store
      uses: nix-community/cache-nix-action@v7
      if: steps.filter.outputs.lockfile == 'false'
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 1G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-last-accessed: P1DT12H
        purge-primary-key: never

    - name: Cachix readonly
      uses: cachix/cachix-action@v17
      if: steps.filter.outputs.lockfile == 'false'
      with:
        name: sumee

    - name: ${{ matrix.hosts }} evaluation
      if: steps.filter.outputs.lockfile == 'false'
      run: nix eval --quiet .#nixosConfigurations.${{ matrix.hosts }}.config.system.build.toplevel
