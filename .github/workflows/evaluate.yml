name: "Evaluate"
on:
  workflow_dispatch:
  push:
    branches:
    - master
    paths:
    - '**.nix'
jobs:
  check:
    name: Check if cache.yml is running
    runs-on: ubuntu-slim
    outputs:
      changes: steps.filter.outputs.lockfile
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          lockfile: 'flake.lock'

  # Ensures it doesn't run if lockfile is updated
  evaluate:
    needs: check
    if: needs.check.outputs.changes == 'false'
    name: Evaluate NixOS Systems
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
    strategy:
      matrix:
        hosts: [beryl, greenery, kaolin, quartz, verdure]

    steps:
    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      with:
        nix_version: 2.31.2
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true

    - name: Restore & Save Nix Store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 1G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-last-accessed: P1DT12H
        purge-primary-key: never

    - name: Cachix readonly
      uses: cachix/cachix-action@v17
      with:
        name: sumee

    - name: ${{ matrix.hosts }} evaluation
      run: nix eval --quiet .#nixosConfigurations.${{ matrix.hosts }}.config.system.build.toplevel
