name: "Update flakes & npins"
on:
  schedule:
    - cron: "0 9 * * 6" # 9 am UTC on Saturday
  workflow_dispatch:
jobs:
  update:
    name: Update script
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/create-github-app-token@v2
      id: generate-token
      with:
        app-id: ${{ secrets.HEADPATS }}
        private-key: ${{ secrets.LAP_PILLOW }}
    - uses: actions/checkout@v6

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      with:
        nix_version: 2.31.2
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true

    - name: Update Flakes
      run: nix flake update

    - name: Update npins
      run: nix shell nixpkgs#npins --command npins update

    - name: Configure nahida-bot
      run: |
          git config --local user.email "nahida-greenery[bot]@users.noreply.github.com"
          git config --local user.name "nahida-greenery[bot]"
          git commit -a -m "Chore: Update flakes & npins"
    
    - name: Push Changes
      uses: ad-m/github-push-action@v1.0.0
      with:
        github_token: ${{ steps.generate-token.outputs.token }}
        branch: ${{ github.ref }}
