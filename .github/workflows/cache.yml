name: "Push derivations to cachix"
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'flake.lock'
      - 'pkgs/**'

  # Run only when pull request is requested for review
  pull_request_review:
    types: [ submitted ]

jobs:
  build-derivations:
    name: Build derivations & Push to Cachix
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Filter
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          lockfile:
            - 'flake.lock'
          packages:
            - 'pkgs/**'

    - name: Aggressive disk space removal
      if: steps.filter.outputs.lockfile == 'true' || github.event.review.state == 'approved'
      uses: wimpysworld/nothing-but-nix@v10
      with:
        nix-permission-edict: true # Ensure install nix action has the right permissions

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      with:
        nix_version: 2.31.2

    - name: Cachix
      uses: cachix/cachix-action@v17
      with:
        name: sumee
        authToken: '${{ secrets.CACHIX_AUTH }}'

    - name: Push flake inputs
      if: steps.filter.outputs.lockfile == 'true' || github.event.review.state == 'approved'
      run: nix flake archive --json | jq -r '.path,(.inputs|to_entries[].value.path)'

    - name: Build system derivations
      if: steps.filter.outputs.lockfile == 'true' || github.event.review.state == 'approved'
      run: nix run github:Mic92/nix-fast-build -- --no-nom --skip-cached  --flake ".#checks.$(nix eval --raw --impure --expr builtins.currentSystem)"

    # More of an edge case honestly since nix-fast-build builds packages too
    - name: Build package derivations
      if: steps.filter.outputs.packages == 'true'
      run: nix build .#nahidacursor .#papiteal .#vesktop
