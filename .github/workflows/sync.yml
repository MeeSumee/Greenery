name: "Sync branches"
on:
  workflow_dispatch:
  push:
    branches:
    - stable
jobs:
  sync:
    name: Sync stable & master after PR merged
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
    - uses: actions/create-github-app-token@v3
      id: generate-token
      with:
        client-id: ${{ secrets.HEADPATS }}
        private-key: ${{ secrets.LAP_PILLOW }}

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ steps.generate-token.outputs.token }}

    - name: Merge stable to master
      run: |
        git fetch origin
        git checkout master
        git merge stable
        # git push origin master
