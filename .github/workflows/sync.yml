name: "Sync branches"
on:
  workflow_dispatch:
  push:
    branches:
    - stable
jobs:
  sync:
    name: Sync stable & master after PR merged
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
    - uses: actions/create-github-app-token@v3
      id: generate-token
      with:
        client-id: ${{ secrets.HEADPATS }}
        private-key: ${{ secrets.LAP_PILLOW }}

    - uses: actions/checkout@v6
      with:
        ref: stable
        token: ${{ steps.generate-token.outputs.token }}
        persist-credentials: false

    - name: Merge stable to master
      run: |
        git config --local user.email "269606562+nahida-greenery[bot]@users.noreply.github.com"
        git config --local user.name "nahida-greenery[bot]"
        git fetch origin
        git checkout master
        git merge --no-commit stable

    # Signed commit
    - name: Commit & Push changes
      uses: iarekylew00t/verified-bot-commit@v2
      with:
        allow-empty-commit: true
        message: 'Chore: Sync Branches'
        token: ${{ steps.generate-token.outputs.token }}
        files: |
          **
