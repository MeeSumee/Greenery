name: "Update Blocklist"
on:
  schedule:
    - cron: "0 9 * * *" # 9 am UTC
  workflow_dispatch:
jobs:
  blocklist:
    name: Update Blocklist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      with:
        nix_version: 2.31.2
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true

    - name: Update
      run: nix shell nixpkgs#npins --command npins update blocklist

    - name: Push Changes
      run: |
          git config --local user.email "nahida-greenery[bot]@users.noreply.github.com"
          git config --local user.name "nahida-greenery[bot]"
          git add npins/sources.json
          git diff --staged --quiet || git commit -m "Chore: Update Blocklist"
          git push
