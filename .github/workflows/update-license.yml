name: "Update License"
on:
  schedule:
    - cron: "0 0 1 1 *" # Jan 1st
  workflow_dispatch:
jobs:
  license:
    name: Update License
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    # Allows Nahida to sign commits
    - uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.GPG_KEY }}
        passphrase: ${{ secrets.GPG_PHRASE }}
        git_user_signingkey: true
        git_commit_gpgsign: true

    - name: Update Year
      run: |
          sed -i "s/[0-9]\{4\}/$(date +"%Y")/g" LICENSE

    # Don't need token generation cause no workflow depends on LICENSE
    - name: Push Changes
      run: |
          git config --local user.email "269606562+nahida-greenery[bot]@users.noreply.github.com"
          git config --local user.name "nahida-greenery[bot]"
          git commit -S -am "Chore: Update License" || git diff --staged --quiet 
          git push
